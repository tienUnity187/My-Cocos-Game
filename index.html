      /* ── HTML Loading Overlay ──────────────────────────────────────────────
         Overlay này hiển thị TRƯỚC khi Cocos engine khởi động.
         Ảnh được đặt cùng thư mục với index.html:
           - loading-gif.gif   : logo dạng animation (GIF)
           - loading-logo.png  : logo tĩnh (PNG), thường đặt phía dưới hoặc trên GIF

         ĐỂ THAY ẢNH: đối tác chỉ cần thay 2 file này, không cần sửa code.
         Khi Cocos loading xong, overlay tự ẩn mượt (CSS transition 0.5s).
      ───────────────────────────────────────────────────────────────────── */
      #sn-loading-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: transparent;
        transition: opacity 0.5s ease;
        pointer-events: none;
      }
      #sn-loading-overlay.hidden {
        opacity: 0;
        /* Xóa khỏi DOM sau khi transition kết thúc (xem JS bên dưới) */
      }
      #sn-loading-overlay img { opacity: 0; object-fit: contain; }
    </style>

    <script type="text/javascript">
      (function () {
        /* ── Responsive GameDiv ─────────────────────────────────── */
        var R_LAND = 16 / 9, R_PORT = 9 / 16;
        function fit() {
          var vw = window.innerWidth, vh = window.innerHeight, w, h;
          var R = vh > vw ? R_PORT : R_LAND;
          if (vw / vh > R) { h = vh; w = Math.round(vh * R); }
          else { w = vw; h = Math.round(vw / R); }
          var d = document.getElementById('GameDiv');
          if (d) { d.style.width = w + 'px'; d.style.height = h + 'px'; }
        }
        document.addEventListener('DOMContentLoaded', fit);
        window.addEventListener('resize', fit);
        window.addEventListener('orientationchange', function () { setTimeout(fit, 200); });

        /* ── Hide loading overlay ───────────────────────────────────
           Được gọi từ LoadingController._onLoadComplete() (Cocos script)
           thông qua: window.snHideLoadingOverlay?.()
        ─────────────────────────────────────────────────────────── */
        window.snHideLoadingOverlay = function () {
          var overlay = document.getElementById('sn-loading-overlay');
          if (!overlay) return;
          overlay.style.transition = 'none';
          overlay.style.opacity = '0';
          overlay.classList.add('hidden');
          overlay.addEventListener('transitionend', function () {
            if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
          }, { once: true });
          /* fallback nếu transition không fire (display:none parent, v.v.) */
          setTimeout(function () {
            if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
          }, 800);
        };
      }());
    </script>
